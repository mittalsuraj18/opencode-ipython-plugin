name: Bug Report
description: Report a bug or issue with the plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: Plugin Version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: opencode_version
    attributes:
      label: OpenCode Version
      placeholder: e.g., 1.14.48
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `python` tool with...
        2. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output from the plugin or relevant error messages
      render: shell
