name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-before-wreck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: tsc --noEmit
      - run: OC_PYTHON_SKIP_CHECK=1 bun test
